<!doctype html>
<html lang="zh-Hant" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>會員登入 — 海外文教中心數位服務平台</title>

  <link rel="stylesheet" href="./dist/styles.css" />
  <script src="./scripts/transition.js"></script>
  <link rel="stylesheet" href="./styles/custom.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="./styles/page.css" />
</head>

<body class="bg-base-200 text-base-content min-h-screen font-sans">

  <site-header></site-header>

  <main>
    <!-- 頁首 Banner -->
    <section class="page-hero relative bg-accent overflow-x-clip h-[220px]">
      <img src="./assets/image/title-graphic.png" alt=""
        class="pointer-events-none select-none absolute top-[90px] right-0 w-[360px] max-w-[45%] opacity-80" />
      <div class="page-container relative z-[1] pt-32">
        <div class="breadcrumbs intro intro-d1 text-sm text-base-content">
          <ul>
            <li><a href="./index.html">首頁</a></li>
            <li>會員登入</li>
          </ul>
        </div>
      </div>
      <img src="./assets/image/pt-graphic.svg" alt=""
        class="pointer-events-none absolute bottom-0 left-0 w-full h-[52px] object-cover" />
    </section>

    <div class="page-container py-12 pb-24">
      <div class="intro intro-d2 max-w-md mx-auto">
        <div class="card bg-base-100 rounded-box shadow-md">
          <div class="card-body gap-6 p-8">

            <div class="text-center">
              <h1 class="text-3xl font-medium">會員登入</h1>
              <p class="text-sm text-base-content/60 mt-2">使用 i僑卡帳號或 Email 登入會員專區</p>
            </div>

            <form id="login-form" class="flex flex-col gap-5" novalidate>
              <div class="apply-form-section">
                <label class="apply-label" for="login-account">帳號 / Email / i僑卡卡號<span
                    class="apply-req">*</span></label>
                <input id="login-account" type="text" value="example@mail.com" placeholder="請輸入帳號或 Email"
                  class="input w-full" required />
              </div>

              <div class="apply-form-section">
                <label class="apply-label" for="login-password">密碼<span class="apply-req">*</span></label>
                <div class="relative">
                  <input id="login-password" type="password" value="demo1234" placeholder="請輸入密碼"
                    class="input w-full pr-12" required />
                  <button type="button" id="toggle-pw"
                    class="absolute inset-y-0 right-0 flex items-center px-3 text-base-content/50 hover:text-base-content"
                    aria-label="顯示密碼">
                    <span class="material-symbols-rounded text-[20px]">visibility</span>
                  </button>
                </div>
              </div>

              <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" class="checkbox checkbox-sm" checked /> 記住我
                </label>
                <a href="#" class="link link-hover text-accent-alt">忘記密碼？</a>
              </div>

              <button type="submit" class="btn btn-neutral rounded-full w-full">登入</button>
            </form>

            <div class="flex items-center gap-3 text-sm text-base-content/40">
              <span class="h-px flex-1 bg-base-content/10"></span>或<span class="h-px flex-1 bg-base-content/10"></span>
            </div>

            <!-- i僑卡快速登入 -->
            <button type="button" id="iqiao-login" class="btn btn-outline rounded-full w-full gap-2">
              <span class="material-symbols-rounded text-[20px]">badge</span>
              使用 i 僑卡快速登入
            </button>

            <p class="text-center text-sm text-base-content/70">
              還沒有帳號？
              <a href="./register.html" class="link link-hover font-semibold text-accent-alt">立即註冊</a>
            </p>

          </div>
        </div>
      </div>
    </div>
  </main>

  <site-footer></site-footer>
  <side-panel></side-panel>

  <script src="./scripts/components.js"></script>
  <script src="./scripts/main.js"></script>
  <script>
    // 顯示 / 隱藏密碼
    const pw = document.getElementById('login-password');
    const tg = document.getElementById('toggle-pw');
    tg.addEventListener('click', () => {
      const show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      tg.querySelector('.material-symbols-rounded').textContent = show ? 'visibility_off' : 'visibility';
    });

    function doLogin(name) {
      try {
        localStorage.setItem('cc-logged-in', '1');
        localStorage.setItem('cc-user-name', name || '陳○○');
      } catch (_) { }
      window.location.href = './member.html';
    }

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      doLogin('陳○○');
    });
    document.getElementById('iqiao-login').addEventListener('click', () => doLogin('陳○○'));
  </script>
</body>

</html>
