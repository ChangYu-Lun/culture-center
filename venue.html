<!doctype html>
<html lang="zh-Hant" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>場地預約 — 海外文教中心數位服務平台</title>

  <!-- 設計系統樣式（DaisyUI 母元件庫 Token 編譯輸出 + 結構客製層）-->
  <link rel="stylesheet" href="./dist/styles.css" />
  <script src="./scripts/transition.js"></script>
  <link rel="stylesheet" href="./styles/custom.css" />

  <!-- 字型：Inter + Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <!-- Material Symbols Rounded -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />

  <!-- Cally 日曆 Web Component（由 daisyUI 自動套用 .cally 樣式；時間搜尋面板用）-->
  <script type="module" src="https://unpkg.com/cally"></script>

  <link rel="stylesheet" href="./styles/page.css" />
</head>

<body class="bg-base-200 text-base-content min-h-screen font-sans">

  <!-- 共用導覽列（元件化，見 scripts/components.js）-->
  <site-header active="venue"></site-header>

  <main>
    <!-- ============================================================= -->
    <!-- 頁首 Banner（場地預約）                                        -->
    <!-- ============================================================= -->
    <section class="page-hero relative bg-accent overflow-x-clip">
      <!-- 裝飾圖形（右上）-->
      <img src="./assets/image/venue-title-graphic.png" alt="" class="pointer-events-none select-none absolute top-4 right-0 w-[520px] max-w-[55%] opacity-90" />

      <div class="page-container relative z-[1] pt-32 pb-36">
        <h1 class="intro intro-d1 text-5xl leading-tight text-accent-content">場地預約</h1>
        <!-- 麵包屑 -->
        <div class="breadcrumbs intro intro-d2 text-sm mt-2 text-base-content">
          <ul>
            <li><a href="./index.html">首頁</a></li>
            <li>場地預約</li>
          </ul>
        </div>
      </div>

      <!-- 底部波浪 -->
      <img src="./assets/image/pt-graphic.svg" alt="" class="pointer-events-none absolute bottom-0 left-0 w-full h-[52px] object-cover" />

      <!-- 搜尋卡（疊在 Banner 底緣，向下凸出）-->
      <div class="intro intro-d3 absolute left-0 right-0 -bottom-7 z-30 px-4 flex justify-center">
        <div class="card w-full max-w-[640px] bg-base-100 rounded-box shadow-md overflow-visible">
          <div class="card-body p-6 overflow-visible">
            <div id="venue-search" class="vd-search relative flex items-center gap-1 rounded-field border border-base-content/20 p-1.5">
              <!-- 地點 -->
              <button type="button" class="vd-field" data-field="location" aria-haspopup="true" aria-expanded="false">
                <span class="material-symbols-rounded text-[18px] text-base-content/50">search</span>
                <span class="vd-field-text" data-placeholder="地點">地點</span>
              </button>
              <span class="vd-div w-px self-stretch my-1.5 bg-base-content/15"></span>
              <!-- 時間 -->
              <button type="button" class="vd-field" data-field="time" aria-haspopup="true" aria-expanded="false">
                <span class="material-symbols-rounded text-[18px] text-base-content/50">schedule</span>
                <span class="vd-field-text" data-placeholder="時間">時間</span>
              </button>
              <span class="vd-div w-px self-stretch my-1.5 bg-base-content/15"></span>
              <!-- 人數 -->
              <button type="button" class="vd-field" data-field="people" aria-haspopup="true" aria-expanded="false">
                <span class="material-symbols-rounded text-[18px] text-base-content/50">person</span>
                <span class="vd-field-text" data-placeholder="1-60+">1-60+</span>
              </button>
              <!-- 搜尋鈕 -->
              <button type="button" class="btn btn-neutral btn-square shrink-0" id="venue-search-btn" aria-label="搜尋">
                <span class="material-symbols-rounded text-[20px]">search</span>
              </button>

              <!-- ===== 地點面板（兩頁：洲 tile → 文教中心）===== -->
              <div class="vd-panel" data-panel="location" hidden>
                <div class="vd-loc-page" data-page="zones">
                  <p class="vd-panel-title">選擇地區</p>
                  <div class="vd-tile-grid" data-zone-grid></div>
                </div>
                <div class="vd-loc-page" data-page="centers" hidden>
                  <button type="button" class="vd-back" data-loc-back>
                    <span class="material-symbols-rounded text-[18px]">arrow_back</span>
                    <span data-zone-name></span>
                  </button>
                  <ul class="vd-center-list" data-center-list></ul>
                </div>
              </div>

              <!-- ===== 時間面板（日曆 + 起訖時間）===== -->
              <div class="vd-panel" data-panel="time" hidden>
                <calendar-date id="vd-search-cal" class="cally">
                  <svg aria-label="上一月" class="fill-current size-4" slot="previous" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15.75 19.5 8.25 12l7.5-7.5"></path></svg>
                  <svg aria-label="下一月" class="fill-current size-4" slot="next" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="m8.25 4.5 7.5 7.5-7.5 7.5"></path></svg>
                  <calendar-month></calendar-month>
                </calendar-date>
                <div class="vd-time-row">
                  <label class="vd-time-cell">
                    <span class="vd-time-label">開始時間</span>
                    <select id="vd-search-start" class="select select-sm w-full" aria-label="開始時間"></select>
                  </label>
                  <label class="vd-time-cell">
                    <span class="vd-time-label">結束時間</span>
                    <select id="vd-search-end" class="select select-sm w-full" aria-label="結束時間"></select>
                  </label>
                </div>
              </div>

              <!-- ===== 人數面板（雙端點橫條）===== -->
              <div class="vd-panel" data-panel="people" hidden>
                <p class="vd-panel-title">人數範圍</p>
                <div class="vd-dualrange">
                  <div class="vd-dr-rail"></div>
                  <div class="vd-dr-fill" id="vd-dr-fill"></div>
                  <input type="range" min="1" max="60" value="1" id="vd-people-min" class="vd-range-min" aria-label="最少人數" />
                  <input type="range" min="1" max="60" value="60" id="vd-people-max" class="vd-range-max" aria-label="最多人數" />
                </div>
                <div class="vd-people-nums">
                  <label class="vd-num">
                    <span class="vd-time-label">最少人數</span>
                    <input type="number" min="1" max="60" value="1" id="vd-people-min-num" class="input input-sm w-full" />
                  </label>
                  <span class="text-base-content/40 self-end pb-2">—</span>
                  <label class="vd-num">
                    <span class="vd-time-label">最多人數</span>
                    <input type="number" min="1" max="60" value="60" id="vd-people-max-num" class="input input-sm w-full" />
                  </label>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ============================================================= -->
    <!-- 結果列表                                                      -->
    <!-- ============================================================= -->
    <section class="intro intro-d4 pt-24 pb-20">
      <div class="page-container">
        <!-- 工具列 -->
        <div class="flex items-center justify-between gap-4 flex-wrap mb-8">
          <div class="flex items-center gap-3 flex-wrap">
            <div class="flex items-center gap-2">
              <span class="text-sm font-medium whitespace-nowrap">共 60 筆，每頁顯示</span>
              <select class="select select-bordered h-10 min-h-10 w-20 text-sm" aria-label="每頁顯示筆數">
                <option>16</option>
                <option>24</option>
                <option>48</option>
              </select>
            </div>
            <select class="select select-bordered h-10 min-h-10 w-[121px] text-sm" aria-label="排序方式">
              <option>相關性</option>
              <option>最新上架</option>
              <option>價格低到高</option>
              <option>價格高到低</option>
            </select>
          </div>
          <!-- 檢視切換 -->
          <div class="join" id="view-toggle">
            <button class="join-item btn btn-neutral btn-square is-active" data-view="grid" aria-label="格狀檢視" aria-pressed="true">
              <span class="material-symbols-rounded text-[20px]">grid_view</span>
            </button>
            <button class="join-item btn btn-outline btn-square" data-view="list" aria-label="列表檢視" aria-pressed="false">
              <span class="material-symbols-rounded text-[20px]">format_list_bulleted</span>
            </button>
          </div>
        </div>

        <!-- 卡片網格 -->
        <div id="venue-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-x-11 gap-y-10">
          <!-- 卡片由 JS 產生 -->
        </div>

        <!-- 分頁 -->
        <div class="flex justify-center mt-16">
          <div class="join">
            <button class="join-item btn btn-outline btn-square" aria-label="上一頁">
              <span class="material-symbols-rounded text-[20px]">arrow_back_ios_new</span>
            </button>
            <button class="join-item btn btn-neutral" aria-current="page">1</button>
            <button class="join-item btn btn-outline">2</button>
            <button class="join-item btn btn-outline">3</button>
            <button class="join-item btn btn-outline">4</button>
            <button class="join-item btn btn-outline btn-square" aria-label="下一頁">
              <span class="material-symbols-rounded text-[20px]">arrow_forward_ios</span>
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ============================================================= -->
  <!-- Footer                                                        -->
  <!-- ============================================================= -->
  <!-- 共用頁尾與浮動面板（元件化，見 scripts/components.js）-->
  <site-footer></site-footer>
  <side-panel></side-panel>

  <script src="./scripts/components.js"></script>
  <script src="./scripts/main.js"></script>
  <script src="./scripts/venue.js"></script>
</body>
</html>
