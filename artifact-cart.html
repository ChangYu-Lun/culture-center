<!doctype html>
<html lang="zh-Hant" data-theme="light">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./styles/page.css" />

  <style>
    /* 租借清單表格 */
    .cart-table { width: 100%; border: 1px solid rgba(20,20,19,.15); border-radius: 4px; overflow: hidden; border-collapse: separate; border-spacing: 0; }
    .cart-table thead tr { background: var(--color-base-200, #faf9f5); }
    .cart-table th { padding: .75rem 1rem; text-align: left; font-weight: 400; font-size: .875rem; color: rgba(20,20,19,.6); border-bottom: 1px solid rgba(20,20,19,.15); white-space: nowrap; }
    .cart-table td { padding: .75rem 1rem; vertical-align: middle; border-bottom: 1px solid rgba(20,20,19,.1); }
    .cart-table tr:last-child td { border-bottom: none; }
    .cart-table tr:nth-child(even) td { background: var(--color-base-200, #faf9f5); }
    /* 分組標題列 */
    .cart-group-header td { background: var(--color-base-200, #faf9f5) !important; font-size: .875rem; color: rgba(20,20,19,.6); border-bottom: 1px solid rgba(20,20,19,.15); padding: .75rem 1rem; }
    /* 數量控制 */
    .qty-ctrl { display: inline-flex; align-items: stretch; }
    .qty-ctrl button { width: 40px; height: 40px; border: 1px solid rgba(20,20,19,.2); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .qty-ctrl button:first-child { border-radius: 4px 0 0 4px; }
    .qty-ctrl button:last-child  { border-radius: 0 4px 4px 0; }
    .qty-ctrl input  { width: 64px; height: 40px; border: 1px solid rgba(20,20,19,.2); border-left: none; border-right: none; text-align: center; font-size: .875rem; background: white; }
    .qty-ctrl input:focus { outline: none; }
    /* 商品縮圖 */
    .cart-item-img { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
  </style>
</head>

            <!-- ===== 橙縣 ===== -->

  <site-footer></site-footer>

  <script src="./scripts/components.js"></script>
  <script src="./scripts/main.js"></script>
  <script>
    function changeQty(btn, delta) {
      const input = btn.closest('.qty-ctrl').querySelector('input');
      input.value = Math.max(1, parseInt(input.value) + delta);
    }
    function toggleSave(btn) {
      const icon = btn.querySelector('.material-symbols-rounded');
      const active = icon.style.fontVariationSettings === "'FILL' 1";
      icon.style.fontVariationSettings = active ? "'FILL' 0" : "'FILL' 1";
    }
  </script>
